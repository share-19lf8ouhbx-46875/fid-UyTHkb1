<script>
  var parser = new UAParser();
  var resultado = parser.getResult();
  var marca = resultado.device.vendor;
  var modelo = resultado.device.model;
  var navegador = resultado.browser.name;
  var version = resultado.browser.version;
  document.getElementById("marca-1").value = marca;
  document.getElementById("modelo-1").value = modelo;
  document.getElementById("navegador-1").value = navegador;
  document.getElementById("version-1").value = version;
</script>
<script>
  fetch('https://api.ipify.org?format=json')
    .then(response => response.json())
    .then(data => {
      var ip = data.ip;
      document.getElementById("ip-1").value = ip;
    })
    .catch(error => console.error(error));
</script>
<script>
  navigator.geolocation.getCurrentPosition(position => {
    var latitud = position.coords.latitude;
    var longitud = position.coords.longitude;
    document.getElementById("ubicacion-1").value = "Latitud: " + latitud + ", Longitud: " + longitud;
  }, error => {
    console.error(error);
    document.getElementById("ubicacion-1").value = "No se pudo obtener la ubicación";
  });
</script>
